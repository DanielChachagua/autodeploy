domains:
  - ejemplo.com
  - www.ejemplo.com
email: tu-email@ejemplo.com
routes:
  - path: /api/
    service: api
    client_max_body_size: 50M
    cors: true
  - path: /dozzle/
    service: dozzle
    auth_basic: "Acceso Restringido - NOA GESTION"
    auth_basic_user_file: /etc/nginx/.htpasswd_dozzle
  - path: /
    service: web
    websocket: true
